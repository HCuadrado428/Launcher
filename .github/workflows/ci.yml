name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.5'
      - run: npm ci
      - run: npm test

  pack:
    # electron-builder firma el .exe con signtool.exe, así que la validación
    # de que el paquete se genera bien solo tiene sentido en Windows (que es
    # además la única plataforma que build.win/nsis soporta en este proyecto).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.5'
      - run: npm ci
      - run: npm run pack
